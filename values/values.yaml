domain: "uds.dev"

sso:
  enabled: false
monitoring:
  enabled: true

# Pod-level security
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container-level security
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  allowPrivilegeEscalation: false

logging:
  dbLevel: "debug" # error, warn, info, debug
