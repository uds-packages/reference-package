kind: UDSBundle
metadata:
  name: reference-package-test
  description: A UDS bundle for deploying Reference Package and its dependencies on a development cluster
  version: dev

packages:
  - name: postgres-operator
    repository: ghcr.io/uds-packages/postgres-operator
    ref: 1.15.1-uds.4-upstream
    overrides:
      postgres-operator:
        uds-postgres-config:
          values:
            - path: postgresql
              value:
                enabled: true  # Set to false to not create the PostgreSQL resource
                teamId: "uds"
                volume:
                  size: "10Gi"
                numberOfInstances: 2
                users:
                  reference-package.reference-package: []  # database owner
                databases:
                  reference: reference-package.reference-package
                version: "15"
                ingress:
                  - remoteNamespace: reference-package

  - name: seaweedfs-operator
    # Local, unpublished package — path reference until seaweedfs-operator is published.
    path: ../../seaweedfs-operator
    ref: dev
    flavor: upstream
    overrides:
      seaweedfs-operator:
        uds-seaweedfs-operator-config:
          values:
            - path: seaweed.enabled
              value: true
            # Provision an app-specific bucket + S3 identity and copy the credentials
            # into the reference-package namespace.
            - path: apps
              value:
                - name: reference-package
                  namespace: reference-package
                  bucketNames:
                    - reference
                  remoteSelector:
                    app: reference-package
                  copyPassword:
                    enabled: true
                    secretName: "reference-package-minio"
                    secretIDKey: "access_key"
                    secretPasswordKey: "secret_key"

  - name: reference-package
    path: ../
    ref: dev
    overrides:
      reference-package:
        uds-reference-package-config:
          values:
            - path: minio.enabled
              value: true
            # Point the object-storage netpol at the SeaweedFS S3 gateway instead of the MinIO tenant.
            # Overrides deep-merge with the chart default selector, so the default MinIO tenant
            # label must be explicitly nulled out or the netpol AND-matches a label no S3 pod has.
            - path: minio.namespace
              value: seaweedfs
            - path: minio.selector
              value:
                app.kubernetes.io/name: seaweedfs
                app.kubernetes.io/component: s3
                v1.min.io/tenant: null
            - path: minio.port
              value: 8333
        reference-package:
          values:
            - path: database
              value:
                secretName: "reference-package-postgres"
                secretKey: "PASSWORD"
            - path: sso
              value:
                enabled: true
                secretName: reference-package-sso
            - path: monitoring
              value:
                enabled: true
            - path: minio.enabled
              value: true
            # SeaweedFS S3 gateway endpoint (replaces the MinIO tenant endpoint); creds
            # secret name/keys are unchanged so the rest of the chart defaults still apply
            - path: minio.endpoint
              value: seaweedfs-s3.seaweedfs.svc.cluster.local:8333
