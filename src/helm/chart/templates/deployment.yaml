apiVersion: apps/v1
kind: Deployment
metadata:
  name: reference-package
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reference-package
  template:
    metadata:
      labels:
        app: reference-package
    spec:
      containers:
        - name: reference-package
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: "{{ .Values.image.pullPolicy }}"
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: {{ .Values.database.secretKey }}
            - name: MONITORING_ENABLED
              value: {{ .Values.monitoring.enabled | quote }}
          {{- if .Values.sso.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.sso.secretName }}
          {{- end }}
