apiVersion: apps/v1
kind: Deployment
metadata:
  name: reference-package
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reference-package
  template:
    metadata:
      labels:
        app: reference-package
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: reference-package
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: "{{ .Values.image.pullPolicy }}"
          ports:
            - containerPort: 8080
          env:
            - name: DB_LOG_LEVEL
              value: {{ .Values.logging.dbLevel | default "info" | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: {{ .Values.database.secretKey }}
            {{- if .Values.minio.enabled }}
            - name: S3_ENDPOINT
              value: {{ .Values.minio.endpoint | quote }}
            - name: S3_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: S3_USE_SSL
              value: {{ .Values.minio.useSSL | quote }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.secretName }}
                  key: {{ .Values.minio.accessKeyKey }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.secretName }}
                  key: {{ .Values.minio.secretKeyKey }}
            {{- end }}
            - name: MONITORING_ENABLED
              value: {{ .Values.monitoring.enabled | quote }}
          {{- if .Values.sso.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.sso.secretName }}
          {{- end }}
          resources:                                                                                                                                                                                                                                               
            limits:                                                                                                                                                                                                                                                
              cpu: 500m                                                                                                                                                                                                                                            
              memory: 512Mi                                                                                                                                                                                                                                        
            requests:                                                                                                                                                                                                                                              
              cpu: 200m                                                                                                                                                                                                                                            
              memory: 256Mi
