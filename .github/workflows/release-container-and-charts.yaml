name: Release Container & Charts

on:
  push:
    branches:
      - main
    paths:
      - ".github/container-and-chart/**"
      - ".github/workflows/release-container-and-charts.yaml"

# Permissions for the GITHUB_TOKEN used by the workflow.
permissions:
  contents: read # Allows reading the content of the repository.
  packages: read # Allows reading the content of the repository's packages.
  id-token: write

jobs:
  publish:
    runs-on: appstore-4-core-amd64
    permissions:
      contents: write # Allows writing the content of the repository.
      packages: write # Allows writing the content of the repository's packages.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1.0.1
        with:
          # renovate: datasource=github-tags depName=defenseunicorns/uds-cli versioning=semver
          version: v0.30.4

      - name: Install ORAS CLI
        if: ${{ inputs.publish-repo }}
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2
        with:
          # renovate: datasource=github-tags depName=oras-project/oras versioning=semver
          version: 1.3.2

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          # renovate: datasource=github-tags depName=azure/azure-devops-helm-extension versioning=semver
          version: v3.18.3

      - name: Environment setup
        run: |
          echo "MARU_AUTH=\"{\"raw.githubusercontent.com\": \"${{ secrets.GITHUB_TOKEN }}\"}\"" >> "GITHUB_ENV"
          uds run actions:setup-environment \
          --set REGISTRY1_USERNAME="${{ secrets.IRON_BANK_ROBOT_USERNAME }}" \
          --set REGISTRY1_PASSWORD="${{ secrets.IRON_BANK_ROBOT_PASSWORD }}" \
          --set GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
          --set RAPIDFORT_USERNAME="${{ secrets.RAPIDFORT_USERNAME }}" \
          --set RAPIDFORT_PASSWORD="${{ secrets.RAPIDFORT_PASSWORD }}"
        shell: bash

      - name: Get Container Version
        id: get_version
        run: |
          VERSION=$(cat .github/container-and-chart/docker/version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and Push Container Image
        run: |
          CONTAINER_PATH=".github/container-and-chart/docker"
          IMAGE_ID=ghcr.io/uds-packages/reference-package/container/reference-package

          SHA_TAG=sha-$(echo ${{ github.sha }} | head -c 7)

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --tag $IMAGE_ID:${{ env.VERSION }} \
            --tag $IMAGE_ID:latest \
            --file $CONTAINER_PATH/Dockerfile \
            .github/container-and-chart/docker

      - name: Build and Push Helm Chart
        run: |
          CHART_PATH=".github/container-and-chart/helm/chart"
          REGISTRY="ghcr.io/uds-packages/reference-package/helm"

          helm package $CHART_PATH --destination ./dist --app-version ${{ env.VERSION }}

          PKG_NAME=$(find ./dist -maxdepth 1 -name "*.tgz" -print -quit)

          echo "Pushing $PKG_NAME..."
          helm push "$PKG_NAME" oci://$REGISTRY
