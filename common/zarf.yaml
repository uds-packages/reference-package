# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: reference-package-common
  description: "UDS Reference Package Common Package"

components:
  - name: reference-package
    required: true
    charts:
      - name: uds-reference-package-config
        namespace: reference-package
        version: 0.1.0
        localPath: ../chart
        values:
          - sourcePath: .domain
            targetPath: .domain
      - name: reference-package
        namespace: reference-package
        version: 0.1.2
        url: oci://ghcr.io/uds-packages/reference-package/helm/reference-package
        values:
          - sourcePath: "."
            targetPath: "."
            excludePaths:
              - .domain
